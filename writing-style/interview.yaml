# Writing Style Interview
# 14 questions across 3 phases to discover, diagnose, and differentiate a user's writing style.
# The synthesizer maps answers to register weights and dimension positions.

version: "1.0.0"
description: >
  A structured interview that surfaces writing preferences through open-ended exploration,
  spectrum-based calibration, and context-specific probes. Run all 14 questions for a full
  profile, or use phase 1 alone for a quick sketch.

phases:
  - id: discover
    name: "Phase 1: Discover"
    description: "Open-ended questions that surface raw preferences and influences."
    questions:
      - id: q1
        text: "Think of writing you wished you had written. What made it appealing?"
        answer_type: open_text
        purpose: "Surfaces aspirational register and aesthetic values"
        maps_to:
          registers: [primary, secondary]
          dimensions: [formality, warmth, playfulness, abstraction]
        follow_up: "Can you name a specific author, article, or book?"

      - id: q2
        text: "When you explain your work to an outsider, what do you do — analogies, diagrams, stories?"
        answer_type: open_text
        purpose: "Reveals natural explanatory register"
        maps_to:
          registers: [primary, secondary]
          dimensions: [density, abstraction, structure]
        follow_up: "What about when explaining to a peer in your field?"

      - id: q3
        text: "Show me something you've written that you're proud of — any format."
        answer_type: writing_sample
        purpose: "Direct analysis of actual writing for register identification and dimension calibration"
        maps_to:
          registers: [primary, secondary, accent]
          dimensions: [formality, density, warmth, pace, structure, voice_person, authority, abstraction, playfulness, context_dependence]
        follow_up: "What do you like most about this piece?"

      - id: q4
        text: "What writing makes you cringe? What tone repels you?"
        answer_type: open_text
        purpose: "Establishes negative space — generates 'not' constraints"
        maps_to:
          registers: [anti_registers]
          dimensions: [formality, warmth, playfulness]
        follow_up: "Is there a specific word or phrase that's an instant turn-off?"

  - id: diagnose
    name: "Phase 2: Diagnose"
    description: "Spectrum-based questions that calibrate specific dimensions."
    questions:
      - id: q5
        text: "Complex topics: build up from examples, or start big picture and zoom in?"
        answer_type: spectrum
        spectrum:
          left: "Examples first, then generalize"
          right: "Big picture first, then specifics"
        purpose: "Calibrates abstraction and pedagogical approach"
        maps_to:
          registers: [secondary]
          dimensions: [abstraction, structure]

      - id: q6
        text: "Scale: writing that sounds like a person with opinions, or could be written by anyone?"
        answer_type: spectrum
        spectrum:
          left: "Distinctly me — opinions, voice, personality"
          right: "Could be anyone — neutral, institutional, anonymous"
        purpose: "Calibrates voice_person and authority"
        maps_to:
          registers: []
          dimensions: [voice_person, authority, formality]

      - id: q7
        text: "Do you over-explain or under-explain more often?"
        answer_type: spectrum
        spectrum:
          left: "Over-explain — I add too much context"
          right: "Under-explain — I assume people follow"
        purpose: "Calibrates density and context_dependence"
        maps_to:
          registers: []
          dimensions: [density, context_dependence, pace]

      - id: q8
        text: "When sharing good news professionally, does your writing get enthusiastic or stay measured?"
        answer_type: spectrum
        spectrum:
          left: "Enthusiastic — excitement shows through"
          right: "Measured — same tone regardless"
        purpose: "Calibrates warmth and formality under positive conditions"
        maps_to:
          registers: []
          dimensions: [warmth, formality, playfulness]

      - id: q9
        text: "Pick two: rigorous, accessible, beautiful, practical, provocative"
        answer_type: multiple_choice
        choices: [rigorous, accessible, beautiful, practical, provocative]
        select_count: 2
        purpose: "Forces priority trade-off between competing style values"
        maps_to:
          registers: [primary, secondary]
          dimensions: [density, warmth, playfulness, authority, abstraction]
        choice_mappings:
          rigorous:
            register_boost: [academic-analytical, technical-referential]
            dimension_nudge: { density: +1, authority: +1 }
          accessible:
            register_boost: [popularizing-explainer, pedagogical]
            dimension_nudge: { density: -1, warmth: +0.5 }
          beautiful:
            register_boost: [literary-poetic, lyrical-reflective]
            dimension_nudge: { playfulness: +0.5, abstraction: +0.5 }
          practical:
            register_boost: [documentation-instructional, consultative-advisory]
            dimension_nudge: { structure: +1, abstraction: -1 }
          provocative:
            register_boost: [advocacy-persuasive, social-thread]
            dimension_nudge: { authority: +1, playfulness: +0.5 }

      - id: q10
        text: "Bullet points or paragraphs?"
        answer_type: spectrum
        spectrum:
          left: "Paragraphs — ideas need room to breathe"
          right: "Bullets — get to the point"
        purpose: "Direct structure calibration"
        maps_to:
          registers: []
          dimensions: [structure, pace]

  - id: differentiate
    name: "Phase 3: Differentiate"
    description: "Context-specific probes that reveal how style shifts across situations."
    questions:
      - id: q11
        text: "Three audiences you write for — how does your voice change?"
        answer_type: open_text
        purpose: "Identifies context switches and register repertoire breadth"
        maps_to:
          registers: [context_switches]
          dimensions: [formality, density, warmth]
        follow_up: "Which voice feels most natural?"

      - id: q12
        text: "Would we recognize the same person across your emails, social media, and publications?"
        answer_type: spectrum
        spectrum:
          left: "Very different — I code-switch heavily"
          right: "Very consistent — same voice everywhere"
        purpose: "Measures register flexibility vs. consistency"
        maps_to:
          registers: [context_switches]
          dimensions: [formality, voice_person]

      - id: q13
        text: "What proportion: teach, persuade, document, or express?"
        answer_type: proportion
        categories: [teach, persuade, document, express]
        purpose: "Maps primary purpose to register family"
        maps_to:
          registers: [primary, secondary]
          dimensions: [warmth, authority, structure]
        category_mappings:
          teach:
            register_family: A
            top_registers: [pedagogical, popularizing-explainer]
          persuade:
            register_family: D
            top_registers: [advocacy-persuasive, consultative-advisory]
          document:
            register_family: A_E
            top_registers: [documentation-instructional, technical-referential]
          express:
            register_family: C
            top_registers: [lyrical-reflective, narrative-storytelling]

      - id: q14
        text: "A writer, publication, or brand whose voice you admire, even from a different field?"
        answer_type: open_text
        purpose: "Anchors style to a known reference point for calibration"
        maps_to:
          registers: [primary, accent]
          dimensions: [formality, warmth, playfulness, authority]
        follow_up: "What specifically about their voice appeals to you?"

# Scoring guidance for the synthesizer
scoring:
  register_selection:
    primary: "Highest weighted register from combined signals"
    secondary: "2nd and 3rd highest, must be from different families than primary when possible"
    accent: "Registers with moderate signal that add texture without dominating"
    anti: "Registers explicitly rejected via q4 or low-scoring across all signals"

  dimension_calibration:
    baseline: 3
    range: [1, 5]
    half_points: true
    method: "Start at 3 (neutral), adjust based on cumulative signal from all questions"

  not_constraints:
    generation: >
      For each dimension where the value is >= 3.5 or <= 2.5, generate a 'not' constraint.
      Format: '[positive quality] but not [excess]'.
      Example: warmth=4 generates 'warm but not gushing'.
      Example: formality=2 generates 'casual but not sloppy'.
