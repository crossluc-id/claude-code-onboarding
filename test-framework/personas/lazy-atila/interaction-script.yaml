# Interaction script for Lazy Atila
# Each turn is sent as a user message via `claude -p`
# [INJECT: path] markers are replaced by the orchestrator with file contents
# SESSION_ID from turn 1 is reused for subsequent turns via --resume

persona: lazy-atila
engagement_level: low
turns:

  - id: intro
    description: "Minimal introduction"
    message: |
      hey, I'm a hairstylist and I do some math stuff with cutting. help me set up claude code
    expect_session_id: true

  - id: profile
    description: "Provide minimal research profile"
    message: |
      here's my profile thing:

      [INJECT: personas/lazy-atila/profile.md]
    resume: true

  - id: project_claude_md
    description: "Provide minimal project CLAUDE.md"
    message: |
      and here's my project file:

      [INJECT: personas/lazy-atila/project-claude-md.md]
    resume: true

  - id: links
    description: "Share one link"
    message: |
      [INJECT: fixtures/links-lazy.md]
    resume: true

  - id: skip_extras
    description: "Skip optional steps"
    message: |
      looks good, what else do I need to do? just the basics
    resume: true

  - id: done
    description: "Wrap up quickly"
    message: |
      ok cool thanks
    resume: true
