# Interaction script for Hyperactive Atila
# Each turn is sent as a user message via `claude -p`
# [INJECT: path] markers are replaced by the orchestrator with file contents
# SESSION_ID from turn 1 is reused for subsequent turns via --resume

persona: hyperactive-atila
engagement_level: high
turns:

  - id: intro
    description: "Introduce self with rich context"
    message: |
      Hi! I'm Atila Kovacs, a session hairstylist based in Budapest. I've been cutting
      hair for 12 years but for the last 2 years I've been working on something unusual —
      a mathematical framework for haircutting that I call Geometric Sectioning Theory, or
      GST. It applies concepts from topology, fractal geometry, and the golden ratio to
      how we section and cut hair. I'm not a coder at all but I'm very comfortable with
      spatial math and visual reasoning. I want to use Claude Code to help me research,
      write about, and eventually teach this framework. Can you help me get set up?
    expect_session_id: true

  - id: profile
    description: "Provide filled research profile"
    message: |
      Here's my research profile — I filled it out pretty thoroughly:

      [INJECT: personas/hyperactive-atila/profile.md]

      Can you incorporate this into my setup? I want Claude to know all of this
      about me every time we work together.
    resume: true

  - id: project_claude_md
    description: "Provide project CLAUDE.md"
    message: |
      And here's the project CLAUDE.md I wrote for my research project folder:

      [INJECT: personas/hyperactive-atila/project-claude-md.md]

      Please save this and use it to configure my project workspace.
    resume: true

  - id: writing_sample
    description: "Share writing sample for voice/tone calibration"
    message: |
      I also want to share some of my writing so you know my voice and style.
      Here's a blog post draft I've been working on:

      [INJECT: fixtures/writing-sample-hyperactive.md]

      This is how I naturally write — can you pick up on that tone and help me
      maintain it in things we write together?
    resume: true

  - id: links
    description: "Share research links and references"
    message: |
      Here are some links and references I've been collecting:

      [INJECT: fixtures/links-hyperactive.md]

      Can you review these and tell me which ones are most relevant to GST? Also
      add them to my bibliography if you're tracking one.
    resume: true

  - id: custom_rules
    description: "Ask about rules customization"
    message: |
      I noticed the setup has some default rules. Can you customize them for my
      specific situation? I want rules that emphasize:
      1. Always research before claiming something is novel
      2. Use warm, interdisciplinary language (not cold academic tone)
      3. When writing content, match my voice from the writing sample
      4. Cite sources — I need to build credibility as a non-academic
      5. If there's a mathematical concept, explain it with a haircutting analogy too
    resume: true

  - id: plugins
    description: "Request all plugins"
    message: |
      I want to install all the recommended plugins. Especially interested in:
      - The research/search ones (Exa, mgrep) — I need to find academic papers
      - Memory (claude-mem) — I want Claude to remember our research across sessions
      - The skill creator — I want to build custom research skills later
      Can you set all of those up?
    resume: true

  - id: custom_skills
    description: "Request custom skills"
    message: |
      One more thing — can you create a custom skill for "literature review"? When
      I say "review the literature on [topic]", I want Claude to:
      1. Search broadly with Exa and mgrep
      2. Compile findings into a structured summary
      3. Identify gaps where my work might contribute
      4. Save the results to my research-notes folder
      Also, can you make a "workshop design" skill that helps me turn research
      findings into teachable workshop exercises?
    resume: true

  - id: followup
    description: "Ask follow-up questions"
    message: |
      This is great! A few questions:
      1. Can I create a skill that automatically formats my research notes into
         potential article outlines?
      2. Is there a way to have Claude compare my GST principles against existing
         mathematical frameworks automatically?
      3. How do I set up voice mode? I sometimes want to just talk through ideas
         while I'm cutting hair
      4. Can Claude help me create interactive GeoGebra visualizations?
    resume: true
